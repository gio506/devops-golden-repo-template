name: Reusable DevOps Standards CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  structure_check:
    name: structure-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify required template files
        shell: bash
        run: |
          required_files=(
            "README.md"
            "CHEATSHEET.md"
            "FILES_EXPLAINED.md"
            "docs/standards.md"
            "docs/template-checklist.md"
            ".github/workflows/ci.yml"
            ".github/workflows/ci-reusable.yml"
          )
          for file in "${required_files[@]}"; do
            test -f "$file" || {
              echo "Missing required file: $file"
              exit 1
            }
          done

  markdown_lint:
    name: markdown-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: structure_check
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md

  yaml_lint:
    name: yaml-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: markdown_lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_file: .yamllint.yml

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: yaml_lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect shell scripts
        id: detect
        shell: bash
        run: |
          if git ls-files '*.sh' | grep -q .; then
            echo "has_shell=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_shell=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run ShellCheck
        if: steps.detect.outputs.has_shell == 'true'
        uses: ludeeus/action-shellcheck@2.0.0
      - name: No shell scripts found
        if: steps.detect.outputs.has_shell != 'true'
        run: echo "No shell scripts found. Skipping shellcheck."

  secret_scan:
    name: secret-scan-gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: shellcheck
    steps:
      - name: Checkout (full history for gitleaks commit range)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  final_status:
    name: final-status-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    needs:
      - structure_check
      - markdown_lint
      - yaml_lint
      - shellcheck
      - secret_scan
    steps:
      - name: Aggregate job results
        env:
          STRUCTURE: ${{ needs.structure_check.result }}
          MARKDOWN: ${{ needs.markdown_lint.result }}
          YAML: ${{ needs.yaml_lint.result }}
          SHELL: ${{ needs.shellcheck.result }}
          SECRETS: ${{ needs.secret_scan.result }}
        shell: bash
        run: |
          echo "structure_check=$STRUCTURE"
          echo "markdown_lint=$MARKDOWN"
          echo "yaml_lint=$YAML"
          echo "shellcheck=$SHELL"
          echo "secret_scan=$SECRETS"

          failed=0
          for result in "$STRUCTURE" "$MARKDOWN" "$YAML" "$SHELL" "$SECRETS"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              failed=1
            fi
          done

          if [ "$failed" -eq 1 ]; then
            echo "One or more required CI stages failed."
            exit 1
          fi

          echo "All CI stages completed successfully (or were legitimately skipped)."
